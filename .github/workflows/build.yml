name: Build TouchFence APK

on: [push, workflow_dispatch]

# Needed so the job can publish the built APK as a GitHub Release
# (the in-app updater downloads it from there).
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Unzip the project
        run: unzip -q TouchFence.zip

      - name: Set up JDK 17 with Gradle caching
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build debug APK
        run: |
          cd TouchFence
          chmod +x gradlew
          # Unique, increasing versionCode per build so the updater can tell
          # builds apart. Offset by 1000 to stay above the pinned 13.
          ./gradlew assembleDebug --no-daemon \
            -PversionCodeOverride=$((1000 + GITHUB_RUN_NUMBER))

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchFence-apk
          path: TouchFence/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish releases (rolling 'latest' + per-branch channel)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CODE=$((1000 + GITHUB_RUN_NUMBER))
          BRANCH="$GITHUB_REF_NAME"
          SLUG=$(printf '%s' "$BRANCH" | tr '/' '-' | tr -cd 'A-Za-z0-9-')
          APK=TouchFence/app/build/outputs/apk/debug/app-debug.apk
          cp "$APK" "TouchFence-$CODE.apk"
          NOTES="versionCode=$CODE"$'\n'"branch=$BRANCH"$'\n'"$GITHUB_SHA"
          # Per-branch channel (tag "ch-<slug>") for the in-app channel picker — every branch.
          gh release delete "ch-$SLUG" --cleanup-tag --yes || true
          gh release create "ch-$SLUG" "TouchFence-$CODE.apk" \
            --title "$BRANCH — build $CODE" \
            --notes "$NOTES" \
            --latest=false
          # Rolling 'latest' (the updater's default target) ONLY from main, so a
          # feature branch can never become everyone's default update.
          if [ "$BRANCH" = "main" ]; then
            gh release delete latest --cleanup-tag --yes || true
            gh release create latest "TouchFence-$CODE.apk" \
              --title "latest — main build $CODE" \
              --notes "$NOTES" \
              --latest
          fi
