name: Build TouchFence APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Unzip the project
        run: unzip -q TouchFence.zip

      - name: Build debug APK
        run: |
          cd TouchFence
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchFence-apk
          path: TouchFence/app/build/outputs/apk/debug/app-debug.apk
